apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: myapp-shards
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: kind-shard-a
          - cluster: kind-shard-b
  template:
    metadata:
      name: myapp-{{cluster}}
    spec:
      project: default
      source:
        repoURL: https://github.com/SEU-USUARIO/gitops-lab
        targetRevision: main
        path: apps/myapp
      destination:
        name: '{{cluster}}'
        namespace: app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true